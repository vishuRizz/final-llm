services:
  train:
    build: .
    image: mini-ml:latest
    volumes:
      - .:/app
    command: python scripts/train.py
    device_requests:
      - driver: nvidia
        count: 1
        capabilities: [gpu]

  generate:
    build: .
    image: mini-ml:latest
    profiles: [tools]
    volumes:
      - .:/app
    command: python scripts/generate.py --prompt hi --tokens 80
    device_requests:
      - driver: nvidia
        count: 1
        capabilities: [gpu]

  chat:
    build: .
    image: mini-ml:latest
    profiles: [tools]
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    command: python scripts/chat.py
    device_requests:
      - driver: nvidia
        count: 1
        capabilities: [gpu]